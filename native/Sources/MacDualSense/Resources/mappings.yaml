version: 2

settings:
  poll_interval_ms: 10
  app_focus_cache_ttl_ms: 100
  controller:
    preferred: auto
  wispr:
    mode: rcmd_hold
    hold_ms: 450

profiles:
  active: default
  items:
    default:
      mappings:
        default:
          # D-pad navigation
          dpad_up:
            type: keystroke
            key: up
          dpad_down:
            type: keystroke
            key: down
          dpad_left:
            type: keystroke
            key: left
          dpad_right:
            type: keystroke
            key: right

          # Face buttons
          cross:
            type: keystroke
            key: return
          circle:
            type: keystroke
            key: escape
          triangle:
            type: wispr
          square:
            type: keystroke
            key: tab

          # Shoulder buttons
          l1:
            type: keystroke
            key: "["
            modifiers: [cmd, shift]
          r1:
            type: keystroke
            key: "]"
            modifiers: [cmd, shift]
          l2:
            type: keystroke
            key: up
            modifiers: [alt]
          r2:
            type: keystroke
            key: down
            modifiers: [alt]

          # Stick buttons
          l3:
            type: keystroke
            key: c
            modifiers: [ctrl]
          r3:
            type: keystroke
            key: d
            modifiers: [ctrl]

          # Special buttons
          ps:
            type: wispr
          options:
            type: keystroke
            key: "y"
          share:
            type: keystroke
            key: "n"
          touchpad:
            type: keystroke
            key: return

        # Warp terminal
        warp:
          square:
            type: keystroke
            key: k
            modifiers: [cmd]        # Command palette
          l1:
            type: keystroke
            key: up
            modifiers: [cmd]        # Previous block
          r1:
            type: keystroke
            key: down
            modifiers: [cmd]        # Next block
          l2:
            type: keystroke
            key: t
            modifiers: [cmd]        # New tab
          r2:
            type: keystroke
            key: w
            modifiers: [cmd]        # Close tab
          options:
            type: keystroke
            key: return
            modifiers: [cmd]        # Run command
          share:
            type: keystroke
            key: k
            modifiers: [cmd, shift] # Clear screen

        # Arc browser
        arc:
          square:
            type: keystroke
            key: t
            modifiers: [cmd]        # New tab
          circle:
            type: keystroke
            key: "["
            modifiers: [cmd]        # Back
          l1:
            type: keystroke
            key: "["
            modifiers: [cmd, shift] # Prev tab
          r1:
            type: keystroke
            key: "]"
            modifiers: [cmd, shift] # Next tab
          l2:
            type: keystroke
            key: up
            modifiers: [alt]        # Scroll up
          r2:
            type: keystroke
            key: down
            modifiers: [alt]        # Scroll down
          l3:
            type: keystroke
            key: l
            modifiers: [cmd]        # Focus URL bar
          r3:
            type: keystroke
            key: r
            modifiers: [cmd]        # Refresh
          options:
            type: keystroke
            key: w
            modifiers: [cmd]        # Close tab
          share:
            type: keystroke
            key: "["
            modifiers: [cmd]        # Back

        # Chrome / Google Chrome
        chrome:
          square:
            type: keystroke
            key: t
            modifiers: [cmd]        # New tab
          circle:
            type: keystroke
            key: "["
            modifiers: [cmd]        # Back
          l1:
            type: keystroke
            key: "["
            modifiers: [cmd, shift] # Prev tab
          r1:
            type: keystroke
            key: "]"
            modifiers: [cmd, shift] # Next tab
          l2:
            type: keystroke
            key: up
            modifiers: [alt]        # Scroll up
          r2:
            type: keystroke
            key: down
            modifiers: [alt]        # Scroll down
          l3:
            type: keystroke
            key: l
            modifiers: [cmd]        # Focus URL bar
          r3:
            type: keystroke
            key: r
            modifiers: [cmd]        # Refresh
          options:
            type: keystroke
            key: w
            modifiers: [cmd]        # Close tab
          share:
            type: keystroke
            key: "["
            modifiers: [cmd]        # Back

        # Slack
        slack:
          square:
            type: keystroke
            key: k
            modifiers: [cmd]        # Quick switcher
          circle:
            type: keystroke
            key: escape             # Close panel
          l1:
            type: keystroke
            key: "["
            modifiers: [cmd]        # Prev channel
          r1:
            type: keystroke
            key: "]"
            modifiers: [cmd]        # Next channel
          l2:
            type: keystroke
            key: up
            modifiers: [alt]        # Prev unread
          r2:
            type: keystroke
            key: down
            modifiers: [alt]        # Next unread
          l3:
            type: keystroke
            key: k
            modifiers: [cmd, shift] # DMs
          r3:
            type: keystroke
            key: a
            modifiers: [cmd, shift] # All unreads
          options:
            type: keystroke
            key: return             # Send message
          share:
            type: keystroke
            key: n
            modifiers: [cmd]        # New message

        # ChatGPT desktop
        chatgpt:
          square:
            type: keystroke
            key: n
            modifiers: [cmd]        # New chat
          cross:
            type: keystroke
            key: return             # Send
          circle:
            type: keystroke
            key: escape             # Stop generating
          l1:
            type: keystroke
            key: up
            modifiers: [cmd]        # Prev chat
          r1:
            type: keystroke
            key: down
            modifiers: [cmd]        # Next chat
          l2:
            type: keystroke
            key: up                 # Scroll up
          r2:
            type: keystroke
            key: down               # Scroll down
          options:
            type: keystroke
            key: c
            modifiers: [cmd, shift] # Copy last response
          share:
            type: keystroke
            key: backspace
            modifiers: [cmd]        # Delete chat

        # Claude desktop
        claude:
          square:
            type: keystroke
            key: n
            modifiers: [cmd]        # New conversation
          cross:
            type: keystroke
            key: return             # Send
          circle:
            type: keystroke
            key: escape             # Stop
          l1:
            type: keystroke
            key: o
            modifiers: [cmd]        # Open recents
          r1:
            type: keystroke
            key: ","
            modifiers: [cmd]        # Settings
          l2:
            type: keystroke
            key: up                 # Scroll up
          r2:
            type: keystroke
            key: down               # Scroll down
          options:
            type: keystroke
            key: c
            modifiers: [cmd, shift] # Copy
          share:
            type: keystroke
            key: backspace
            modifiers: [cmd]        # Clear

haptics:
  enabled: true
  patterns:
    confirm:
      intensity: 128
      duration_ms: 50
    error:
      intensity: 255
      duration_ms: 100
      repeat: 2
    connect:
      intensity: 64
      duration_ms: 200
